services:
  postgres:
    image: postgres:16-alpine
    container_name: sudoku-postgres-prod
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${DB_USER:-sudoku}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-sudoku}
      - POSTGRES_DB=${DB_NAME:-sudoku}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-sudoku} -d ${DB_NAME:-sudoku}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sudoku-backend-prod
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-me-use-a-strong-random-secret-in-production}
      - CORS_ORIGIN=https://sudoku.gberti.com
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-sudoku}
      - DB_USER=${DB_USER:-sudoku}
      - DB_PASSWORD=${DB_PASSWORD:-sudoku}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sudoku-frontend-prod
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sudoku.rule=Host(`sudoku.gberti.com`)"
      - "traefik.http.routers.sudoku.entrypoints=websecure"
      - "traefik.http.routers.sudoku.tls=true"
      - "traefik.http.routers.sudoku.tls.certresolver=leresolver"
      - "traefik.http.services.sudoku.loadbalancer.server.port=80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - traefik
    restart: always

volumes:
  pgdata_prod:

networks:
  internal:
  traefik:
    external: true
